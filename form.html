<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 style="text-align: center; background-color: rgb(125, 179, 236);  border: 3px solid black; ">Form</h1>
   <form style="text-align: center; background-color: rgb(125, 179, 236);  border: 2px solid black; ">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="name"><br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="email"><br><br>

         <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone" placeholder="number"><br><br>
        Gender:
    <input type="radio" name="gender"> Male
    <input type="radio" name="gender"> Female
<br><br>
Skills:
<input type="checkbox" name="skills"> HTML
    <input type="checkbox" name="skills"> CSS
    <input type="checkbox" name="skills"> JavaScript
<br><br>
<label for="country">Country:</label>
<select id="country" name="country">
    <option value="">Select Country</option>
    <option value="Pakistan">Pakistan</option>
    <option value="USA">USA</option>
    <option value="UK">UK</option>
</select>
<br></br>
        <label for="message">Message:</label><br>
        <textarea id="message" name="message" rows="4" cols="50"></textarea><br><br>

        <input type="submit" value="Submit">
    </form>
</body>
</html>
